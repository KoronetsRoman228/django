<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Магазин кактусів{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'shop/css/style.css' %}">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">Магазин Кактусів</div>
            <nav>
                <ul>
                    <li><a href="{% url 'shop:main' %}">Головна</a></li>
                    {% for category in categories %}
                        <li><a href="{% url 'shop:category' category.slug %}">{{ category.name }}</a></li>
                    {% endfor %}
                </ul>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-links">
                <a href="{% url 'shop:main' %}">Головна</a>
                <a href="#">Про нас</a>
                <a href="#">Контакти</a>
                <a href="#">Політика конфіденційності</a>
            </div>
            <p>&copy; 2026 Магазин Кактусів. Всі права захищені.</p>
        </div>
    </footer>
</body>
</html>
